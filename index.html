<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora - Fórmula de Hubbart</title>
    <style>
        /* Fundo e texto principal com as cores do GitHub Dark */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            background-color: #0d1117; /* Fundo exato do GitHub */
            color: #c9d1d9; /* Cor do texto cinza claro */
            padding: 20px; 
            margin: 0; 
        }
        
        h2 { text-align: center; color: #c9d1d9; margin-bottom: 30px; }
        
        /* O "caixote" principal com uma cor ligeiramente mais clara para destacar do fundo */
        .container { max-width: 1000px; margin: 0 auto; background-color: #161b22; border: 1px solid #30363d; padding: 30px; border-radius: 6px; }
        
        .layout-principal { display: flex; gap: 30px; flex-wrap: wrap; }
        .area-inputs { flex: 2; min-width: 300px; }
        .grelha-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* Caixas de input com o estilo do GitHub */
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #c9d1d9; }
        input { 
            width: 100%; 
            padding: 10px; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            border: 1px solid #30363d; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 15px; 
        }
        
        /* Efeito quando clicas na caixa para escrever */
        input:focus { border-color: #58a6ff; outline: none; box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3); }
        
        .area-resultados { flex: 1; min-width: 300px; }
        
        /* A caixa verde com o estilo "Success" do GitHub */
        .result-box { 
            padding: 25px; 
            background-color: rgba(35, 134, 54, 0.1); /* Verde transparente */
            border: 1px solid #238636; /* Verde GitHub */
            border-radius: 6px; 
            height: 100%; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
        }
        
        .result-item { margin-bottom: 15px; font-size: 16px; border-bottom: 1px solid #30363d; padding-bottom: 10px;}
        .result-item strong { color: #8b949e; }
        
        /* O preço final bem destacado a verde */
        .final-adr { font-size: 26px; font-weight: bold; color: #3fb950; text-align: center; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #30363d; }
        
        @media (max-width: 768px) {
            .grelha-inputs { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Fórmula de Hubbart</h2>
    
    <div class="layout-principal">
        
        <div class="area-inputs">
            <div class="grelha-inputs">
                <div>
                    <label>Total de Quartos:</label>
                    <input type="number" id="quartos" value="230" oninput="calcular()">
                </div>
                <div>
                    <label>Taxa de Ocupação (%):</label>
                    <input type="number" id="ocupacao" value="80" oninput="calcular()">
                </div>
                <div>
                    <label>Capital Próprio (€):</label>
                    <input type="number" id="capital" value="4500000" oninput="calcular()">
                </div>
                <div>
                    <label>Lucro Desejado (ROE %):</label>
                    <input type="number" id="roe" value="17" oninput="calcular()">
                </div>
                <div>
                    <label>Imposto IRC (%):</label>
                    <input type="number" id="irc" value="40" oninput="calcular()">
                </div>
                <div>
                    <label>Empréstimo Bancário (€):</label>
                    <input type="number" id="emprestimo" value="7500000" oninput="calcular()">
                </div>
                <div>
                    <label>Taxa de Juro (%):</label>
                    <input type="number" id="juros" value="12" oninput="calcular()">
                </div>
                <div>
                    <label>Custo Direto por Quarto (€):</label>
                    <input type="number" id="custoQuarto" value="12" oninput="calcular()">
                </div>
                <div style="grid-column: 1 / -1;">
                    <label>Custos Gerais (Amortizações + Não Distribuídos) (€):</label>
                    <input type="number" id="custosGerais" value="2050000" oninput="calcular()">
                </div>
                <div style="grid-column: 1 / -1;">
                    <label>Outras Receitas (F&B + Outros - Telefones) (€):</label>
                    <input type="number" id="outrasReceitas" value="295000" oninput="calcular()">
                </div>
            </div>
        </div>

        <div class="area-resultados">
            <div class="result-box">
                <div class="result-item"><strong>Total de Diárias:</strong> <br><span id="resDiarias"></span></div>
                <div class="result-item"><strong>Lucro Antes de Impostos:</strong> <br><span id="resLucro"></span></div>
                <div class="result-item"><strong>Receita Exigida Total:</strong> <br><span id="resReceita"></span></div>
                <div class="final-adr">
                    Diária Média (ADR)<br> <span id="resAdr"></span>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    const formatoEuro = new Intl.NumberFormat('pt-PT', { style: 'currency', currency: 'EUR' });
    const formatoNumero = new Intl.NumberFormat('pt-PT');

    function calcular() {
        let quartos = parseFloat(document.getElementById("quartos").value) || 0;
        let ocupacao = parseFloat(document.getElementById("ocupacao").value) || 0;
        let capital = parseFloat(document.getElementById("capital").value) || 0;
        let roe = parseFloat(document.getElementById("roe").value) || 0;
        let irc = parseFloat(document.getElementById("irc").value) || 0;
        let emprestimo = parseFloat(document.getElementById("emprestimo").value) || 0;
        let juros = parseFloat(document.getElementById("juros").value) || 0;
        let custosGerais = parseFloat(document.getElementById("custosGerais").value) || 0;
        let custoQuarto = parseFloat(document.getElementById("custoQuarto").value) || 0;
        let outrasReceitas = parseFloat(document.getElementById("outrasReceitas").value) || 0;

        let diarias = quartos * 365 * (ocupacao / 100);
        let lucroDesejado = capital * (roe / 100);
        let lucroAntesImpostos = lucroDesejado / (1 - (irc / 100));
        let custoJuros = emprestimo * (juros / 100);
        let custosDiretos = diarias * custoQuarto;
        
        let receitaExigida = lucroAntesImpostos + custoJuros + custosGerais + custosDiretos - outrasReceitas;
        let adr = receitaExigida / diarias;

        document.getElementById("resDiarias").innerText = formatoNumero.format(diarias);
        document.getElementById("resLucro").innerText = formatoEuro.format(lucroAntesImpostos);
        document.getElementById("resReceita").innerText = formatoEuro.format(receitaExigida);
        document.getElementById("resAdr").innerText = formatoEuro.format(adr);
    }

    window.onload = calcular;
</script>

</body>
</html>
