<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Gestão Hoteleira ESGHT</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <h2>📊 Dashboard de Alojamentos</h2>
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="mudarSeparador('tab-hubbart', this)">Hubbart</button>
        <button class="tab-btn" onclick="mudarSeparador('tab-kpis', this)">KPIs & Markup</button>
        <button class="tab-btn" onclick="mudarSeparador('tab-custos', this)">Break-Even & 1/1000</button>
        <button class="tab-btn" onclick="mudarSeparador('tab-hitmiss', this)">Hit or Miss</button>
        <button class="tab-btn" onclick="mudarSeparador('tab-mestre', this)">🧙‍♂️ Calculadora Mestre</button>
    </div>

    <div id="tab-hubbart" class="tab-content" style="display: block;">
        <div class="layout-principal">
            <div class="area-inputs">
                <form id="formHubbart" class="grelha-inputs">
                    <div><label>Total de Quartos:</label><input type="number" id="quartos" value="230" oninput="calcularHubbart()"></div>
                    <div><label>Taxa de Ocupação (%):</label><input type="number" id="ocupacao" value="80" oninput="calcularHubbart()"></div>
                    <div><label>Capital Próprio (€):</label><input type="number" id="capital" value="4500000" oninput="calcularHubbart()"></div>
                    <div><label>ROE Desejado (%):</label><input type="number" id="roe" value="17" oninput="calcularHubbart()"></div>
                    <div><label>IRC (%):</label><input type="number" id="irc" value="40" oninput="calcularHubbart()"></div>
                    <div><label>Empréstimo (€):</label><input type="number" id="emprestimo" value="7500000" oninput="calcularHubbart()"></div>
                    <div><label>Taxa Juro (%):</label><input type="number" id="juros" value="12" oninput="calcularHubbart()"></div>
                    <div><label>Custo Direto Quarto (€):</label><input type="number" id="custoQuarto" value="12" oninput="calcularHubbart()"></div>
                    <div style="grid-column: 1 / -1;"><label>Custos Gerais (€):</label><input type="number" id="custosGerais" value="2050000" oninput="calcularHubbart()"></div>
                    <div style="grid-column: 1 / -1;"><label>Outras Receitas (€):</label><input type="number" id="outrasReceitas" value="295000" oninput="calcularHubbart()"></div>
                    <div class="area-botoes">
                        <button type="button" class="btn-imprimir" onclick="window.print()">🖨️ Imprimir PDF</button>
                        <button type="button" class="btn-limpar" onclick="document.getElementById('formHubbart').reset(); calcularHubbart();">🔄 Reset</button>
                    </div>
                </form>
            </div>
            <div class="area-resultados">
                <div class="result-box">
                    <div class="result-item"><strong>Receita Exigida:</strong> <br><span id="resReceita"></span></div>
                    <div class="final-adr">ADR Necessário<br> <span id="resAdr"></span></div>
                    <canvas id="graficoHubbart" style="margin-top:20px;"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-kpis" class="tab-content" style="display: none;">
        <div class="layout-principal">
            <div class="area-inputs">
                <form class="grelha-inputs">
                    <h3 style="grid-column: 1 / -1; color: #58a6ff;">Cálculo de Markup</h3>
                    <div style="grid-column: 1 / -1;"><label>Receita Alojamento (€):</label><input type="number" id="kpiReceita" value="500000" oninput="calcularKpis()"></div>
                    <div><label>Quartos Disponíveis:</label><input type="number" id="kpiDisp" value="5000" oninput="calcularKpis()"></div>
                    <div><label>Quartos Ocupados:</label><input type="number" id="kpiOcup" value="3500" oninput="calcularKpis()"></div>
                    <div><label>IVA (%):</label><input type="number" id="kpiIva" value="6" oninput="calcularKpis()"></div>
                    <div><label>Comissão (%):</label><input type="number" id="kpiCom" value="15" oninput="calcularKpis()"></div>
                    <div style="grid-column: 1 / -1;"><label>COPAR (€):</label><input type="number" id="kpiCopar" value="20" oninput="calcularKpis()"></div>
                </form>
            </div>
            <div class="area-resultados">
                <div class="result-box">
                    <div class="result-item"><strong>NetRevPAR:</strong> <span id="resKpiNet"></span></div>
                    <div class="final-adr">Markup Líquido<br> <span id="resKpiMarkup"></span><br><span id="resKpiStatus" style="font-size:14px;"></span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-custos" class="tab-content" style="display: none;">
        <div class="layout-principal">
            <div class="area-inputs">
                <form class="grelha-inputs">
                    <h3 style="grid-column: 1 / -1; color: #58a6ff;">Break-Even & 1/1000</h3>
                    <div><label>Investimento Total (€):</label><input type="number" id="milInvest" value="1000000" oninput="calcularCustos()"></div>
                    <div><label>Nº Quartos:</label><input type="number" id="milQuartos" value="80" oninput="calcularCustos()"></div>
                    <div style="grid-column: 1 / -1; border-top: 1px solid #30363d; padding-top:10px;"><label>Custos Fixos (€):</label><input type="number" id="beFixos" value="400000" oninput="calcularCustos()"></div>
                    <div><label>Custo Variável Unit. (€):</label><input type="number" id="beVar" value="15" oninput="calcularCustos()"></div>
                    <div><label>Preço Venda Unit. (€):</label><input type="number" id="bePreco" value="40" oninput="calcularCustos()"></div>
                </form>
            </div>
            <div class="area-resultados">
                <div class="result-box">
                    <div class="result-item"><strong>Preço (1/1000):</strong> <span id="resMilPreco"></span></div>
                    <div class="final-adr">Ponto Morto<br> <span id="resBeVol"></span><br><small>quartos</small></div>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-hitmiss" class="tab-content" style="display: none;">
        <div class="layout-principal">
            <div class="area-inputs">
                <form class="grelha-inputs">
                    <div style="grid-column: 1 / -1;"><label>Nº Quartos Hotel:</label><input type="number" id="hitQuartos" value="100" oninput="calcularHitMiss()"></div>
                    <div><label>P. Baixa (€):</label><input type="number" id="hitBaixaP" value="100" oninput="calcularHitMiss()"></div>
                    <div><label>Ocup. Baixa (%):</label><input type="number" id="hitBaixaO" value="80" oninput="calcularHitMiss()"></div>
                    <div><label>P. Média (€):</label><input type="number" id="hitMediaP" value="140" oninput="calcularHitMiss()"></div>
                    <div><label>Ocup. Média (%):</label><input type="number" id="hitMediaO" value="75" oninput="calcularHitMiss()"></div>
                    <div><label>P. Alta (€):</label><input type="number" id="hitAltaP" value="190" oninput="calcularHitMiss()"></div>
                    <div><label>Ocup. Alta (%):</label><input type="number" id="hitAltaO" value="70" oninput="calcularHitMiss()"></div>
                </form>
            </div>
            <div class="area-resultados">
                <div class="result-box">
                    <div class="result-item"><strong>Receita Baixa:</strong> <span id="resHitBaixa"></span></div>
                    <div class="result-item"><strong>Receita Média:</strong> <span id="resHitMedia"></span></div>
                    <div class="result-item"><strong>Receita Alta:</strong> <span id="resHitAlta"></span></div>
                    <div class="final-adr" style="color:#58a6ff;">Vencedor:<br><span id="resHitVencedor"></span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-mestre" class="tab-content" style="display: none;">
        <div class="layout-principal">
            <div class="area-inputs">
                <h3 style="color: #d2a8ff;">Engenharia Inversa</h3>
                <select id="tipoCalculoMestre" onchange="configurarCamposMestre()" style="width:100%; padding:10px; background:#0d1117; color:#c9d1d9; border:1px solid #30363d; border-radius:6px; margin-bottom:20px;">
                    <option value="copar_simples">Descobrir COPAR (via RevPAR/Markup)</option>
                    <option value="revpar_via_net">Descobrir RevPAR (via NetRevPAR)</option>
                    <option value="copar_via_lucro">Descobrir COPAR (via Lucro/Volume)</option>
                    <option value="invest">Investimento Máx. (Regra 1/1000)</option>
                    <option value="ocup_nec">Ocupação Necessária (RevPAR Alvo)</option>
                </select>
                <div id="inputsMestre" class="grelha-inputs"></div>
            </div>
            <div class="area-resultados">
                <div class="result-box">
                    <div class="final-adr" style="color:#d2a8ff;">Resultado:<br><span id="resMestreFinal">---</span></div>
                    <p id="ajudaTeorica" style="font-size:12px; color:#8b949e; margin-top:15px;"></p>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
