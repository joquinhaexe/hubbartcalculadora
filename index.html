<button class="tab-btn" onclick="mudarSeparador('tab-mestre', this)">🧙‍♂️ Calculadora Mestre</button>

<div id="tab-mestre" class="tab-content" style="display: none;">
    <div class="layout-principal">
        <div class="area-inputs">
            <h3 style="color: #58a6ff;">O que queres descobrir?</h3>
            <select id="tipoCalculoMestre" onchange="configurarCamposMestre()" style="width: 100%; padding: 12px; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; margin-bottom: 20px;">
                <option value="invest">Investimento Máximo (Regra 1/1000)</option>
                <option value="quartos">Nº de Quartos Necessários (Regra 1/1000)</option>
                <option value="preco_be">Preço Mínimo de Venda (Break-Even)</option>
                <option value="ocup_nec">Ocupação Necessária (para RevPAR Alvo)</option>
                <option value="adr_alvo">ADR Alvo (para RevPAR Alvo)</option>
                <option value="custos_max">Custos Operacionais Máximos (Inverso Hubbart)</option>
            </select>

            <div id="inputsMestre" class="grelha-inputs">
                </div>
        </div>
        <div class="area-resultados">
            <div class="result-box">
                <div class="result-item" style="text-align: center;">
                    <strong id="labelResultadoMestre">Resultado Estimado:</strong><br>
                    <span id="resMestreFinal" style="font-size: 28px; color: #3fb950; font-weight: bold;">---</span>
                </div>
                <p id="ajudaTeorica" style="font-size: 13px; color: #8b949e; margin-top: 20px; border-top: 1px solid #30363d; padding-top: 10px;"></p>
            </div>
        </div>
    </div>
</div>
