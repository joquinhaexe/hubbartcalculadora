<div id="tab-kpis" class="tab-content" style="display: none;">
        <div class="layout-principal">
            <div class="area-inputs">
                <form id="formKpis" class="grelha-inputs">
                    <h3 style="grid-column: 1 / -1; margin-bottom: 0; color: #58a6ff;">1. Calcular Markup e Sustentabilidade</h3>
                    <div><label>Receita Alojamento (€):</label><input type="number" id="kpiReceita" value="500000" oninput="calcularKpis()"></div>
                    <div><label>Quartos Disponíveis:</label><input type="number" id="kpiDisp" value="5000" oninput="calcularKpis()"></div>
                    <div><label>Quartos Ocupados:</label><input type="number" id="kpiOcup" value="3500" oninput="calcularKpis()"></div>
                    <div><label>IVA (%):</label><input type="number" id="kpiIva" value="6" oninput="calcularKpis()"></div>
                    <div><label>Comissão (%):</label><input type="number" id="kpiCom" value="15" oninput="calcularKpis()"></div>
                    <div style="grid-column: 1 / -1;"><label>COPAR Atual (€):</label><input type="number" id="kpiCopar" value="20" oninput="calcularKpis()"></div>

                    <h3 style="grid-column: 1 / -1; margin-bottom: 0; color: #d2a8ff; border-top: 1px solid #30363d; padding-top: 15px;">2. Engenharia Inversa (O que falta?)</h3>
                    <div style="grid-column: 1 / -1;">
                        <label>Cenário:</label>
                        <select id="cenarioInverso" onchange="alternarCamposInversos()" style="width: 100%; padding: 10px; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px;">
                            <option value="copar_simples">Descobrir COPAR (via RevPAR/Markup)</option>
                            <option value="revpar_via_net">Descobrir RevPAR (via NetRevPAR)</option>
                            <option value="copar_via_lucro">Descobrir COPAR (via Lucro Líquido/Volume)</option>
                        </select>
                    </div>

                    <div id="campos_inversos" class="grelha-inputs" style="grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px;">
                        </div>
                </form>
            </div>
            <div class="area-resultados">
                <div class="result-box">
                    <div class="result-item"><strong>ADR:</strong> <span id="resKpiAdr"></span></div>
                    <div class="result-item"><strong>RevPAR:</strong> <span id="resKpiRevpar"></span></div>
                    <div class="result-item"><strong>NetRevPAR:</strong> <span id="resKpiNet"></span></div>
                    <div class="final-adr">Markup Líquido: <span id="resKpiMarkup"></span><br><span id="resKpiStatus" style="font-size: 14px;"></span></div>
                    
                    <div id="resultado_inverso_box" style="border-top: 1px dashed #30363d; margin-top: 15px; padding-top: 15px;">
                        <div class="result-item"><strong>Resultado do Cenário:</strong></div>
                        <div id="resInversoFinal" style="font-size: 22px; color: #d2a8ff; font-weight: bold; text-align: center;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
